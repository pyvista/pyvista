name: Cache pyvista/data

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner to run cache on."
        required: true
        type: string
    outputs:
      key:
        description: Cache key used for pyvista/data
        value: ${{ jobs.cache-pyvista-data.outputs.key }}

permissions:
  id-token: none
  contents: none

jobs:
  cache-pyvista-data:
    # Workflows that re-use this workflow must specify a runner label for which to cache the data
    name: ${{ inputs.runs-on }}
    runs-on: ${{ inputs.runs-on }}

    outputs:
      key: ${{ steps.restore.outputs.cache-primary-key }}

    steps:
      - name: Set cache path dirname
        run: |
          # define a reusable variable for the folder name
          echo "CACHE_FOLDER_NAME=pyvista-data" >> "$GITHUB_ENV"

      - name: Get pyvista/data commit
        run: echo VTK_DATA_COMMIT=$(git ls-remote https://github.com/pyvista/data HEAD | awk '{ print $1}') >> $GITHUB_ENV

      - name: Restore pyvista/data cache
        id: restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CACHE_FOLDER_NAME }}
          key: pyvista-data-${{ env.VTK_DATA_COMMIT }}
          lookup-only: true

      - name: Clone pyvista/data if cache miss
        if: steps.restore.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: pyvista/data
          path: ${{ env.CACHE_FOLDER_NAME }}

      - name: Save pyvista/data cache
        if: steps.restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CACHE_FOLDER_NAME }}
          key: pyvista-data-${{ env.VTK_DATA_COMMIT }}
          enableCrossOsArchive: true
