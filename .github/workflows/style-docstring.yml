# check spelling, codestyle
name: Style and Docstring Check

on: [pull_request, merge_group, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: none

jobs:
  cache-vtk-data:
    name: Cache vtk-data
    uses: ./.github/workflows/cache-vtk-data.yml
    with:
      # Runner should match the actual runner used by the docstring job
      runs-on: "ubuntu-24.04-self-hosted-gpu"

  docstringcheck:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-self-hosted-gpu
            python-version: "3.14" # Should be the latest version supported
          - os: windows-latest
            python-version: "3.10" # Should be the oldest version supported

    runs-on: ${{ matrix.os }}

    needs: cache-vtk-data
    env:
      TOX_COLORED: "yes"
      PARALLEL: "-n2"
      PYVISTA_VTK_DATA: ${{ github.workspace }}/vtk-data
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Setup headless display on Windows
        if: runner.os == 'Windows'
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0

      - name: Restore vtk-data cache
        uses: actions/cache/restore@v5
        with:
          path: vtk-data
          key: ${{ needs.cache-vtk-data.outputs.key }}
          enableCrossOsArchive: true

      - name: Install tox-uv
        run: pip install tox-uv

      - name: Test Package Docstrings
        run: tox run -f doctest

  vale:
    name: Vale
    runs-on: ubuntu-22.04 # does not support self-hosted (yet)
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install . --group docs

      # this is equivalent to
      # vale --config doc/.vale.ini doc pyvista examples
      # GHA SHA is pinned to a reviewdog branch commit
      - name: "Run Vale"
        uses: errata-ai/vale-action@0135b9fe2b3107365569cc3142b9a1c85221ea2f
        with:
          files: '["doc", "pyvista", "examples"]'
          vale_flags: "--config=doc/.vale.ini"
          reporter: github-pr-check
          level: error
          filter_mode: nofilter
          fail_on_error: true
          version: 2.29.5
          reviewdog_url: https://github.com/reviewdog/reviewdog/releases/download/v0.17.5/reviewdog_0.17.5_Linux_x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
