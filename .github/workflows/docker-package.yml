name: Build and Publish Docker Image
on:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  build-and-publish:
    name: Build ${{ matrix.target }} image
    runs-on: ubuntu-22.04
    # For Pull Requests, only runs from `docker`
    if: github.event_name == 'push' ||
      ( github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'docker')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: jupyter
            flavor: |
              latest=auto
          - target: slim
            flavor: |
              latest=auto
              suffix=-slim,onlatest=true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log into the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: ${{ matrix.flavor }}

      # Build locally first so the smoke test can exercise the image before
      # anything is pushed to the registry.
      - name: Build image (load into local daemon)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: pyvista-ci:${{ matrix.target }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Smoke test (pv.Report)
        run: |
          docker run --rm pyvista-ci:${{ matrix.target }} \
            python -c "import pyvista as pv; print(pv.Report()); assert pv.Sphere().n_points > 0"

      # Second build is a cache hit from the step above; this pushes the
      # already-validated image to the registry under the real tags.
      - name: Push image
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
