name: Build and Publish Docker Image
on:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  build-and-publish:
    name: Build ${{ matrix.target }} image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # For pull requests, run on branches named `docker*` or when the
    # `docker` label is applied. Never runs on forked PRs (needs secrets).
    if: github.event_name == 'push' ||
      ( github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      ( startsWith(github.event.pull_request.head.ref, 'docker') ||
      contains(github.event.pull_request.labels.*.name, 'docker')
      ))
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: jupyter
            flavor: |
              latest=auto
          - target: slim
            flavor: |
              latest=auto
              suffix=-slim,onlatest=true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: ${{ matrix.flavor }}

      # Build locally first so the smoke test can exercise the image before
      # anything is pushed to the registry.
      - name: Build image (load into local daemon)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          load: true
          tags: pyvista-ci:${{ matrix.target }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      # Exercise server-side off-screen rendering so we catch missing GL /
      # EGL runtime libraries instead of shipping an image that can import
      # pyvista but cannot actually render.
      - name: Smoke test (render + GPUInfo)
        run: |
          docker run --rm pyvista-ci:${{ matrix.target }} python -c "
          import numpy as np
          import pyvista as pv
          print(pv.Report())
          print('GPU info:')
          print(pv.GPUInfo())
          pl = pv.Plotter(off_screen=True)
          pl.add_mesh(pv.Sphere(), color='red')
          img = pl.screenshot(return_img=True)
          assert img is not None and img.size > 0, 'empty screenshot'
          assert np.any(img), 'screenshot is all zeros'
          print('screenshot ok:', img.shape, 'non-zero px:', int(np.count_nonzero(img)))
          "

      # Second build is a cache hit from the step above; this pushes the
      # already-validated image to the registry under the real tags.
      - name: Push image
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
