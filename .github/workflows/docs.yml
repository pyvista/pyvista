name: Build Documentation

on: # zizmor: ignore[cache-poisoning]
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *" # once a month on main
  push:
    tags:
      - "*"
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: none

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs == 'true' || steps.self.outputs.changed == 'true' }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
          sparse-checkout: .github/path-filters.yml
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name == 'pull_request'
        id: filter
        with:
          predicate-quantifier: "every"
          filters: .github/path-filters.yml
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name == 'pull_request'
        id: self
        with:
          filters: |
            changed:
              - ".github/workflows/docs.yml"

  cache-vtk-data:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true'
    name: Cache vtk-data
    uses: ./.github/workflows/cache-vtk-data.yml
    with:
      # Runner should match the actual runner used by the build job
      runs-on: "ubuntu-24.04-self-hosted-gpu"

  doc:
    name: Build Documentation
    runs-on: ubuntu-24.04-self-hosted-gpu
    needs: [cache-vtk-data, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true'
    env:
      PARALLEL: "-j2" # Public GitHub runners have 2 real cores
      TOX_COLORED: "yes"
      PYVISTA_VTK_DATA: ${{ github.workspace }}/vtk-data
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set environment for self-hosted
        if: runner.environment == 'self-hosted'
        run: |
          echo "PARALLEL=-j8" >> $GITHUB_ENV

      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05
        if: runner.environment != 'self-hosted'
        with:
          packages: libosmesa6-dev libgl1-mesa-dev python3-tk pandoc git-restore-mtime
          version: 3.0

      - name: Restore vtk-data cache
        uses: actions/cache/restore@v5
        with:
          path: vtk-data
          key: ${{ needs.cache-vtk-data.outputs.key }}
          enableCrossOsArchive: true

      - name: Install tox-uv
        run: pip install tox-uv

      - name: Build Documentation
        run: timeout 3600 tox run -e docs-build

      - name: Dump Sphinx Build Warnings and Errors
        if: always()
        run: if [ -e doc/sphinx_warnings.txt ]; then cat doc/sphinx_warnings.txt; fi

      - name: Dump VTK Warnings and Errors
        if: always()
        run: if [ -e doc/errors.txt ]; then cat doc/errors.txt; fi

      - name: Dump Sphinx Execution Error Logs
        if: always()
        run: |
          shopt -s nullglob
          for f in /tmp/sphinx-err-*.log; do
            cat "$f"
          done

      # Only build the translations for release builds since they take over 3 hours to build
      - uses: actions/checkout@v6
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          repository: pyvista/pyvista-doc-translations
          path: pyvista-doc-translations
          fetch-depth: 0
          persist-credentials: false

      - name: Build I18N Documentation
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tox run -e docs-build -- mini18n-html
          find doc/_build/mini18n-html -mindepth 1 -maxdepth 1 -type d -exec cp -rf {} doc/_build/html/ \;
          rm -rf doc/_build/mini18n-html

      - name: Dump Sphinx Build Warnings and Errors
        if: always()
        run: if [ -e doc/sphinx_warnings.txt ]; then cat doc/sphinx_warnings.txt; fi

      - name: Upload HTML documentation
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: docs-build
          path:
            | # Only vtksz files in 'doc/_build/html/_images/' are used. Exclude all others since these files may be large.
            doc/_build/html/
            !doc/_build/html/index-*.vtksz
            !doc/_build/html/api/**/*.vtksz
            !doc/_build/html/extras/**/*.vtksz
            !doc/_build/html/getting-started/**/*.vtksz
            !doc/_build/html/user-guide/**/*.vtksz

      - name: Upload non-interactive HTML documentation
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-light
          path: |
            doc/_build/html/
            !doc/_build/html/**/*.vtksz

      - uses: actions/upload-artifact@v7
        with:
          name: examples
          path: doc/source/examples/

      - name: Get Notebooks
        run: |
          mkdir _notebooks
          find doc/source/examples -type f -name '*.ipynb' | cpio -p -d -v _notebooks/

      - uses: actions/upload-artifact@v7
        with:
          name: pyvista-notebooks
          path: _notebooks

  test:
    name: Test Documentation
    runs-on: ubuntu-22.04
    needs: [doc, changes]
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true') }}
    env:
      TOX_COLORED: "yes"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install tox-uv
        run: pip install tox-uv

      - uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: doc/_build/html

      - name: Test Documentation
        if: ${{ !cancelled() }}
        run: tox r -e docs-test

      - name: Upload Images for Failed Tests
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: doc-failed-test-images
          path: _doc_failed_test_images

      - name: Upload Generated Images
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: doc-generated-test-images
          path: _doc_generated_test_images

  image-report:
    name: Doc Image Report
    runs-on: ubuntu-22.04
    needs: [test, changes]
    if: always() && github.event_name == 'pull_request' && needs.changes.outputs.docs == 'true'
    environment: ${{ github.event.pull_request.head.repo.fork && 'doc-image-report' || 'doc-image-report-internal' }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tox-uv
        run: pip install tox-uv

      - name: Download doc failed image artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: doc-failed-test-images
          path: all_doc_failed_images

      - name: Generate HTML report
        id: report
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH: ${{ github.head_ref }}
        run: |
          tox run -e image-report -- all_doc_failed_images _doc_image_report
          if [ -f _doc_image_report/index.html ]; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Netlify
        if: steps.report.outputs.has_report == 'true'
        id: netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654
        with:
          publish-dir: _doc_image_report
          production-deploy: false
          github-token: ${{ secrets.PYVISTA_BOT_TOKEN }}
          deploy-message: "Doc image report for PR #${{ github.event.pull_request.number }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-commit-status: false
          github-deployment-environment: doc-image-report
          github-deployment-description: "Doc image comparison report"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DOC_IMAGE_REPORT_SITE_ID }}
        timeout-minutes: 5

      - name: Create commit status with report link
        if: steps.report.outputs.has_report == 'true'
        env:
          GH_TOKEN: ${{ secrets.PYVISTA_BOT_TOKEN }}
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="Deploy / Doc Image Report" \
            -f description="Doc image comparison report is ready" \
            -f target_url="$DEPLOY_URL"

      - name: Add report link to job summary
        if: steps.report.outputs.has_report == 'true'
        env:
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          echo "### Doc Image Report" >> $GITHUB_STEP_SUMMARY
          echo "$DEPLOY_URL" >> $GITHUB_STEP_SUMMARY

  preview:
    name: Preview Development Documentation
    runs-on: ubuntu-22.04
    needs: [doc, changes]
    if: (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') && (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true')
    environment:
      name: ${{ github.event_name != 'pull_request' && 'docs-main' || (github.event.pull_request.head.repo.fork && 'docs-preview' || 'docs-preview-internal') }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: .

      - name: Preview HTML documentation
        id: netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654
        with:
          publish-dir: .
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.PYVISTA_BOT_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-commit-status: false
          github-deployment-environment: docs-preview
          github-deployment-description: "Documentation preview"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }} # DEV site
        timeout-minutes: 10

      - name: Create commit status with preview link
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.PYVISTA_BOT_TOKEN }}
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="Deploy / Docs Preview" \
            -f description="Documentation preview is ready" \
            -f target_url="$DEPLOY_URL"

      - name: Add preview link to job summary
        if: github.event_name == 'pull_request'
        env:
          DEPLOY_URL: ${{ steps.netlify.outputs.deploy-url }}
        run: |
          echo "### Documentation Preview" >> $GITHUB_STEP_SUMMARY
          echo "$DEPLOY_URL" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Publish Release Documentation
    runs-on: ubuntu-22.04
    needs: doc
    if: startsWith(github.ref, 'refs/tags/v')
    environment: docs-release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-build
          path: .

      - name: Deploy Release Documentation
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654
        with:
          publish-dir: .
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STABLE_SITE_ID }} # STABLE site
        timeout-minutes: 10

  publish-notebooks:
    name: Publish Notebooks for MyBinder
    runs-on: ubuntu-22.04
    needs: doc
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Dependencies
        run: |
          pip install cookiecutter
      - uses: actions/download-artifact@v8
        with:
          name: pyvista-notebooks
          path: .

      - name: Make Cookiecutter
        run: |
          cookiecutter -f --no-input --config-file ./doc/source/pyvista-binder-config.yml https://github.com/pyvista/cookiecutter-pyvista-binder.git;
          rm -rf ./pyvista-examples/notebooks/
          cp -r doc/source/examples/ ./pyvista-examples/
          ls -l ./pyvista-examples/

      - name: Publish notebooks on release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          external_repository: pyvista/pyvista-examples
          personal_token: ${{ secrets.PYVISTA_BOT_TOKEN }}
          publish_dir: pyvista-examples
          publish_branch: master
          exclude_assets: ""
