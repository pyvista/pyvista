name: Integration Tests

# zizmor ignore note: All caching for pushes to main should be disabled with the `USE_CACHE` env var
on: # zizmor: ignore[cache-poisoning]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - main
      # To resolve integration test issues, use this branch name pattern
      - "maint/integration*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ALLOW_PLOTTING: true
  SHELLOPTS: "errexit:pipefail"
  TOX_COLORED: "yes"
  USE_CACHE: ${{
    (
    (github.event_name == 'workflow_dispatch' && github.event.inputs.cache == 'true') ||
    (github.event_name == 'pull_request') ||
    (github.event_name == 'push')
    ) &&
    !startsWith(github.ref, 'refs/tags/v') &&
    !startsWith(github.ref, 'refs/heads/release/') &&
    !startsWith(github.ref, 'refs/heads/main')
    }}

permissions:
  id-token: none

jobs:
  Integration:
    # For PRs, only run when the 'integration-testing' label is applied
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'integration-testing')
    name: ${{matrix.project}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: mne
            timeout: 20 # usually takes ~10
          - project: trame
            timeout: 8 # usually takes ~3
          - project: pyvistaqt
            timeout: 5 # usually takes ~2
          - project: geovista
            timeout: 10 # usually takes ~5
          - project: playwright
            timeout: 5 # usually takes ~2
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set test timeout
        run: echo "retry_test_timeout=$(( ${{ matrix.timeout }} / 2 ))" | tee -a "$GITHUB_OUTPUT"
        id: set_timeout

      - uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0
        with:
          qt: ${{matrix.project == 'pyvistaqt' || matrix.project == 'mne'}}
          pyvista: ${{matrix.project != 'pyvistaqt' && matrix.project != 'mne' && matrix.project != 'geovista'}}
          wm: false

      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.13
            3.14

      - name: Set cache key for mne
        if: ${{ matrix.project == 'mne' }}
        run: echo MNE_DATA_KEY=$(curl -L https://github.com/mne-tools/mne-testing-data/raw/refs/heads/master/version.txt) | tee -a "$GITHUB_ENV"

      - uses: actions/cache@v5
        if: ${{ env.USE_CACHE == 'true' && matrix.project == 'mne' }}
        with:
          key: mne-data-${{ env.MNE_DATA_KEY }}
          path: ~/mne_data

      - name: Install tox-uv
        run: pip install tox-uv

      - name: Run tests (${{ matrix.project }})
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: ${{ steps.set_timeout.outputs.retry_test_timeout }}
          max_attempts: 2
          command: tox run -e integration-${{matrix.project}}

  alert-on-failure:
    needs: Integration
    if: >-
      failure() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Report integration test failure
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref }}
        run: |
          body=$(cat <<EOF
          ### Integration Test Failure

          **Date:** $(date -u +%Y-%m-%d)
          **Run:** ${RUN_URL}
          **Ref:** \`${REF}\`
          EOF
          )

          # Check for an existing open issue
          existing=$(gh issue list --label "integration-test-failure" --state open --limit 1 --json number --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Integration test failure" --label "integration-test-failure" --body "$body"
          fi
