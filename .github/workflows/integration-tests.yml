name: Integration Tests

# zizmor ignore note: All caching for pushes to main should be disabled with the `USE_CACHE` env var
on: # zizmor: ignore[cache-poisoning]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - main
      # To resolve integration test issues, use this branch name pattern
      - "maint/integration*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ALLOW_PLOTTING: true
  SHELLOPTS: "errexit:pipefail"
  TOX_COLORED: "yes"
  USE_CACHE: ${{
    (
    (github.event_name == 'workflow_dispatch' && github.event.inputs.cache == 'true') ||
    (github.event_name == 'pull_request') ||
    (github.event_name == 'push')
    ) &&
    !startsWith(github.ref, 'refs/tags/v') &&
    !startsWith(github.ref, 'refs/heads/release/') &&
    !startsWith(github.ref, 'refs/heads/main')
    }}

permissions:
  id-token: none

jobs:
  Integration:
    # For PRs, only run when the 'integration-testing' label is applied
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'integration-testing')
    name: ${{matrix.project}}
    strategy:
      fail-fast: false
      matrix:
        project: ["mne", "trame", "pyvistaqt", "geovista", "pyodide"]
    runs-on: ubuntu-22.04-self-hosted
    defaults:
      run:
        shell: bash -l {0}
    env:
      DISPLAY: ":99.0"
      MNE_LOGGING_LEVEL: "info"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0
        if: ${{matrix.project == 'pyvistaqt' || matrix.project == 'geovista'}}
        with:
          qt: ${{matrix.project == 'pyvistaqt'}}
          pyvista: ${{matrix.project != 'pyvistaqt'}}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tox-uv
        run: pip install tox-uv

      - uses: actions/setup-node@v6
        if: ${{matrix.project == 'pyodide'}}
        with:
          node-version: "20"

      - name: Run tests (no xvfb)
        if: ${{matrix.project != 'geovista'}}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: tox run -e integration-${{matrix.project}}

      - name: Run tests (geovista)
        if: ${{matrix.project == 'geovista'}}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: xvfb-run -a tox run -e integration-${{matrix.project}}

      - name: Run tests (pyodide)
        if: ${{matrix.project == 'pyodide'}}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: tox run -e integration-pyodide

      - uses: actions/cache@v5
        if: ${{ env.USE_CACHE == 'true' && matrix.project == 'mne' }}
        with:
          key: ${{ env.TESTING_VERSION }}
          path: ~/mne_data

  alert-on-failure:
    needs: Integration
    if: >-
      failure() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Report integration test failure
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref }}
        run: |
          body=$(cat <<EOF
          ### Integration Test Failure

          **Date:** $(date -u +%Y-%m-%d)
          **Run:** ${RUN_URL}
          **Ref:** \`${REF}\`
          EOF
          )

          # Check for an existing open issue
          existing=$(gh issue list --label "integration-test-failure" --state open --limit 1 --json number --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Integration test failure" --label "integration-test-failure" --body "$body"
          fi
